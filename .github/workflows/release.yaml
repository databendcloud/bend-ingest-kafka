name: Release

on:
  release:
    types:
      - created

env:
  GO_VERSION: '1.23'
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build_linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            cc: gcc
          - arch: arm64
            cc: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install cross-compilation tools
        if: matrix.arch == 'arm64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Get release
        id: get_release
        uses: bruceadams/get-release@v1.3.2
      - name: Build
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CC: ${{ matrix.cc }}
          RELEASE_VERSION: ${{ steps.get_release.outputs.tag_name }}
        run: |
          go build \
            -ldflags "-X main.version=${RELEASE_VERSION}" \
            -o _bin/bend-ingest-kafka/linux-${{ matrix.arch }}/bend-ingest-kafka
      - name: Compress
        run: |
          cd _bin/bend-ingest-kafka && \
          cp ../../LICENSE linux-${{ matrix.arch }}/ && \
          cp ../../README.md linux-${{ matrix.arch }}/ && \
          tar -zcf bend-ingest-kafka-linux-${{ matrix.arch }}.tar.gz linux-${{ matrix.arch }} && \
          cd .. && \
          sha256sum bend-ingest-kafka/bend-ingest-kafka-linux-${{ matrix.arch }}.tar.gz >> sha256-linux-${{ matrix.arch }}.txt
      - name: Upload tar.gz
        uses: actions/upload-release-asset@v1.0.2
        with:
          upload_url: ${{ steps.get_release.outputs.upload_url }}
          asset_path: ./_bin/bend-ingest-kafka/bend-ingest-kafka-linux-${{ matrix.arch }}.tar.gz
          asset_name: bend-ingest-kafka-linux-${{ matrix.arch }}-${{ steps.get_release.outputs.tag_name }}.tar.gz
          asset_content_type: binary/octet-stream
      - name: Post sha256
        uses: actions/upload-artifact@v4
        with:
          name: sha256sums-linux-${{ matrix.arch }}
          path: ./_bin/sha256-linux-${{ matrix.arch }}.txt
          retention-days: 1

  build_darwin:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Get release
        id: get_release
        uses: bruceadams/get-release@v1.3.2
      - name: Build
        env:
          CGO_ENABLED: 1
          GOOS: darwin
          GOARCH: ${{ matrix.arch }}
          RELEASE_VERSION: ${{ steps.get_release.outputs.tag_name }}
        run: |
          go build \
            -ldflags "-X main.version=${RELEASE_VERSION}" \
            -o _bin/bend-ingest-kafka/darwin-${{ matrix.arch }}/bend-ingest-kafka
      - name: Compress
        run: |
          cd _bin/bend-ingest-kafka && \
          cp ../../LICENSE darwin-${{ matrix.arch }}/ && \
          cp ../../README.md darwin-${{ matrix.arch }}/ && \
          tar -zcf bend-ingest-kafka-darwin-${{ matrix.arch }}.tar.gz darwin-${{ matrix.arch }} && \
          cd .. && \
          shasum -a 256 bend-ingest-kafka/bend-ingest-kafka-darwin-${{ matrix.arch }}.tar.gz >> sha256-darwin-${{ matrix.arch }}.txt
      - name: Upload tar.gz
        uses: actions/upload-release-asset@v1.0.2
        with:
          upload_url: ${{ steps.get_release.outputs.upload_url }}
          asset_path: ./_bin/bend-ingest-kafka/bend-ingest-kafka-darwin-${{ matrix.arch }}.tar.gz
          asset_name: bend-ingest-kafka-darwin-${{ matrix.arch }}-${{ steps.get_release.outputs.tag_name }}.tar.gz
          asset_content_type: binary/octet-stream
      - name: Post sha256
        uses: actions/upload-artifact@v4
        with:
          name: sha256sums-darwin-${{ matrix.arch }}
          path: ./_bin/sha256-darwin-${{ matrix.arch }}.txt
          retention-days: 1

  upload-sha256sums:
    needs: [build_linux, build_darwin]
    runs-on: ubuntu-latest
    name: upload-sha256sums
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Get release
        id: get_release
        uses: bruceadams/get-release@v1.3.2
      - name: Download artifacts
        uses: actions/download-artifact@v4.1.7
        with:
          pattern: sha256sums-*
          merge-multiple: true
          path: sha256sums
      - shell: bash
        run: |
          cat sha256sums/*.txt > sha256sums.txt
      - name: Upload Checksums
        uses: actions/upload-release-asset@v1.0.2
        with:
          upload_url: ${{ steps.get_release.outputs.upload_url }}
          asset_path: sha256sums.txt
          asset_name: sha256sums-${{ steps.get_release.outputs.tag_name }}.txt
          asset_content_type: text/plain
